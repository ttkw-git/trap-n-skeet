  <circle cx="256" cy="256" r="220" fill="none" stroke="#e67e22" stroke-width="18"/>
  <!-- Clay target (orange disc) -->
  <ellipse cx="256" cy="180" rx="72" ry="22" fill="#e67e22"/>
  <ellipse cx="256" cy="180" rx="52" ry="14" fill="#c0392b"/>
  <ellipse cx="256" cy="180" rx="32" ry="8" fill="#e67e22" opacity="0.7"/>
